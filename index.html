<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>مسارات القرآن الكريم</title>
<meta name="theme-color" content="#0F4C3A">
<meta name="description" content="تطبيق لمتابعة مسارات تعلم القرآن الكريم: الحفظ، المراجعة، التلاوة النظري والتطبيقي">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F3ECD9;
    --bg-warm: #EFE6CE;
    --card: #FFFDF6;
    --card-edge: #E4D6A9;
    --ink: #26200F;
    --ink-soft: #6C5F42;
    --ink-faint: #9C8F6E;
    --emerald: #0F4C3A;
    --emerald-deep: #0A342A;
    --emerald-mist: #E4EEE7;
    --gold: #A9791E;
    --gold-bright: #C9972E;
    --gold-mist: #F6ECD3;
    --rust: #93402B;
    --rust-mist: #F3E2DB;
    --line: #DED0A2;
    --shadow: 0 1px 2px rgba(38,32,15,.06), 0 8px 24px -12px rgba(38,32,15,.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 15% -10%, var(--bg-warm), transparent),
      radial-gradient(1000px 500px at 110% 10%, #EEE2C4, transparent),
      var(--bg);
    color:var(--ink);
    font-family:'Tajawal', system-ui, sans-serif;
    min-height:100vh;
    padding:28px 16px 80px;
  }
  .wrap{max-width:920px;margin:0 auto;}

  /* ---------- header ---------- */
  header{text-align:center;margin-bottom:30px;}
  .kicker{
    font-family:'IBM Plex Sans Arabic', sans-serif;
    font-size:12.5px; letter-spacing:.5px; color:var(--gold);
    font-weight:600; margin-bottom:6px;
  }
  h1{
    font-family:'Amiri', serif;
    font-weight:700;
    font-size:clamp(30px,5vw,42px);
    color:var(--emerald-deep);
    margin:0 0 8px;
  }
  header p.sub{
    color:var(--ink-soft); font-size:14.5px; margin:0; font-weight:400;
  }
  .divider{
    display:flex; align-items:center; gap:10px; justify-content:center; margin:18px auto 0; max-width:360px;
  }
  .divider .ln{height:1px; flex:1; background:linear-gradient(90deg,transparent,var(--line),transparent);}
  .divider svg{flex-shrink:0;}

  /* ---------- path rail (signature element) ---------- */
  .rail{
    position:relative;
    display:flex; justify-content:space-between; align-items:flex-start;
    margin:34px 0 26px;
    padding:0 6px;
  }
  .rail::before{
    content:"";
    position:absolute; top:22px; right:5%; left:5%; height:2px;
    background:repeating-linear-gradient(90deg, var(--line) 0 8px, transparent 8px 14px);
    z-index:0;
  }
  .station{
    position:relative; z-index:1;
    display:flex; flex-direction:column; align-items:center; gap:10px;
    cursor:pointer; background:none; border:none; font-family:inherit;
    width:23%; padding:0;
  }
  .node{
    width:44px; height:44px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:var(--card); border:2px solid var(--line);
    color:var(--ink-faint);
    transition:all .2s ease;
  }
  .node svg{width:20px;height:20px;}
  .station .label{
    font-size:12.5px; font-weight:600; color:var(--ink-soft);
    text-align:center; line-height:1.35; transition:color .2s ease;
  }
  .station .count{
    font-family:'IBM Plex Sans Arabic',sans-serif; font-size:10.5px; color:var(--ink-faint);
  }
  .station.active .node{
    background:var(--emerald); border-color:var(--emerald);
    color:var(--gold-mist);
    box-shadow:0 6px 16px -6px rgba(15,76,58,.55);
  }
  .station.active .label{color:var(--emerald-deep);}
  .station:hover .node{border-color:var(--gold);}

  /* ---------- panel ---------- */
  .panel{
    background:var(--card);
    border:1px solid var(--card-edge);
    border-radius:16px;
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  .panel-head{
    padding:20px 24px 16px;
    border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .panel-head h2{
    font-family:'Amiri', serif; font-size:22px; color:var(--emerald-deep); margin:0;
    font-weight:700;
  }
  .panel-head .desc{font-size:12.5px; color:var(--ink-faint); margin-top:2px;}

  form.entry{
    padding:18px 24px 6px;
    display:grid; grid-template-columns:repeat(4,1fr); gap:12px 14px;
  }
  form.entry .field{display:flex; flex-direction:column; gap:5px;}
  form.entry .field.wide{grid-column:span 2;}
  form.entry .field.full{grid-column:1/-1;}
  label{font-size:12px; color:var(--ink-soft); font-weight:600;}
  input,select{
    font-family:'Tajawal', sans-serif;
    font-size:14px;
    padding:9px 11px;
    border-radius:9px;
    border:1px solid var(--line);
    background:#FFFFFF;
    color:var(--ink);
    outline:none;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  input:focus,select:focus{border-color:var(--emerald); box-shadow:0 0 0 3px var(--emerald-mist);}
  input[readonly]{background:var(--gold-mist); color:var(--ink-soft);}

  .form-actions{
    grid-column:1/-1;
    display:flex; justify-content:flex-start; margin:6px 0 18px;
  }
  button.submit{
    font-family:'Tajawal',sans-serif;
    background:var(--emerald); color:#FBF6E4;
    border:none; padding:10px 22px; border-radius:9px;
    font-size:14px; font-weight:700; cursor:pointer;
    transition:background .15s ease, transform .1s ease;
  }
  button.submit:hover{background:var(--emerald-deep);}
  button.submit:active{transform:scale(.98);}

  .list-wrap{padding:4px 24px 22px;}
  .list-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 2px 8px; border-top:1px dashed var(--line); margin-top:8px;
  }
  .list-head h3{font-size:13px; color:var(--ink-faint); font-weight:700; margin:0; letter-spacing:.3px;}

  .entry-card{
    display:grid;
    grid-template-columns:1fr auto;
    gap:6px 16px;
    align-items:center;
    background:var(--bg-warm);
    border:1px solid var(--card-edge);
    border-radius:11px;
    padding:12px 14px;
    margin-bottom:9px;
  }
  .entry-main{display:flex; flex-wrap:wrap; gap:6px 16px; align-items:center; font-size:13.5px;}
  .entry-main .day{font-weight:700; color:var(--emerald-deep); font-family:'IBM Plex Sans Arabic',sans-serif;}
  .entry-main .date{color:var(--ink-faint); font-size:12.5px; font-family:'IBM Plex Sans Arabic',sans-serif;}
  .entry-main .range{color:var(--ink); font-size:13px;}
  .entry-main .range b{font-weight:600;}
  .entry-main .course{color:var(--ink-soft); font-style:italic;}
  .badge{
    display:inline-flex; align-items:center; padding:3px 11px; border-radius:99px;
    font-size:12px; font-weight:700; white-space:nowrap;
  }
  .badge.good{background:var(--emerald-mist); color:var(--emerald-deep);}
  .badge.mid{background:var(--gold-mist); color:var(--gold);}
  .badge.low{background:var(--rust-mist); color:var(--rust);}
  .row-actions{display:flex; gap:8px;}
  .del{
    background:none; border:none; cursor:pointer; color:var(--ink-faint);
    padding:6px; border-radius:7px; transition:color .15s ease, background .15s ease;
  }
  .del:hover{color:var(--rust); background:var(--rust-mist);}
  .empty{
    text-align:center; padding:34px 10px; color:var(--ink-faint); font-size:13.5px;
  }
  .empty svg{opacity:.5; margin-bottom:8px;}

  .backup-bar{
    display:flex; justify-content:center; gap:10px; margin-top:18px; flex-wrap:wrap;
  }
  .ghost-btn{
    display:inline-flex; align-items:center; gap:7px;
    font-family:'Tajawal',sans-serif; font-size:12.5px; font-weight:600;
    color:var(--ink-soft); background:transparent;
    border:1px dashed var(--line); padding:8px 14px; border-radius:9px;
    cursor:pointer; transition:border-color .15s ease, color .15s ease;
  }
  .ghost-btn:hover{color:var(--emerald-deep); border-color:var(--gold);}

  @media (max-width:640px){
    form.entry{grid-template-columns:1fr 1fr;}
    form.entry .field.wide, form.entry .field.full{grid-column:1/-1;}
    .station .label{font-size:11px;}
    .entry-card{grid-template-columns:1fr;}
    .row-actions{justify-content:flex-end;}
  }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const STORAGE_KEYS = {
  hifz: 'track_hifz',
  muraja3a: 'track_muraja3a',
  nazari: 'track_nazari',
  tatbiqi: 'track_tatbiqi'
};

const TRACKS = [
  { id:'hifz', title:'مسار الحفظ', desc:'تسجيل مقدار الحفظ اليومي وتقييمه', icon:iconBook() },
  { id:'muraja3a', title:'مسار المراجعة', desc:'متابعة المقدار الذي تمت مراجعته', icon:iconRefresh() },
  { id:'nazari', title:'التلاوة النظري', desc:'متن التجويد أو مذكرة الأحكام', icon:iconScroll() },
  { id:'tatbiqi', title:'التلاوة التطبيقي', desc:'تطبيق أحكام التلاوة على المقرر', icon:iconWave() },
];

let state = { hifz:[], muraja3a:[], nazari:[], tatbiqi:[], active:'hifz', loaded:false };

function iconBook(){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5.5C4 4.7 4.7 4 5.5 4H11v16H5.5A1.5 1.5 0 0 1 4 18.5v-13Z"/><path d="M20 5.5c0-.8-.7-1.5-1.5-1.5H13v16h5.5a1.5 1.5 0 0 0 1.5-1.5v-13Z"/></svg>`;}
function iconRefresh(){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12a8 8 0 0 1 13.66-5.66L20 8"/><path d="M20 4v4h-4"/><path d="M20 12a8 8 0 0 1-13.66 5.66L4 16"/><path d="M4 20v-4h4"/></svg>`;}
function iconScroll(){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h11a2 2 0 0 1 2 2v12"/><path d="M6 4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h11"/><path d="M19 18a2 2 0 0 1-2 2"/><path d="M9 8h6M9 12h6"/></svg>`;}
function iconWave(){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h2l2-7 3 14 3-11 2 8 2-4h4"/></svg>`;}
function iconEmpty(){return `<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="12" cy="12" r="9"/><path d="M9 10h.01M15 10h.01M8 15c1.2 1 2.6 1.5 4 1.5s2.8-.5 4-1.5"/></svg>`;}
function iconTrash(){return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13"/></svg>`;}

function weekday(dateStr){
  if(!dateStr) return '';
  try{
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('ar-EG-u-ca-gregory', { weekday:'long' });
  }catch(e){ return ''; }
}
function fmtDate(dateStr){
  if(!dateStr) return '';
  try{
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('ar-EG-u-ca-gregory', { day:'numeric', month:'long', year:'numeric' });
  }catch(e){ return dateStr; }
}
function uid(){ return 'r_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

async function loadAll(){
  for(const key of Object.keys(STORAGE_KEYS)){
    try{
      const raw = localStorage.getItem(STORAGE_KEYS[key]);
      state[key] = raw ? JSON.parse(raw) : [];
    }catch(e){ state[key] = []; }
  }
  state.loaded = true;
  render();
}
async function persist(trackId){
  try{
    localStorage.setItem(STORAGE_KEYS[trackId], JSON.stringify(state[trackId]));
  }catch(e){ console.error('storage error', e); }
}

function ratingBadgeClass(val, mapping){
  return mapping[val] || 'mid';
}

const RATING_SETS = {
  hifz: [
    {v:'جيد', cls:'good'}, {v:'متوسط', cls:'mid'}, {v:'يحتاج لإعادة', cls:'low'}
  ],
  nazari: [
    {v:'جيد', cls:'good'}, {v:'متوسط', cls:'mid'}, {v:'يحتاج لإعادة', cls:'low'}
  ],
  tatbiqi: [
    {v:'جيدة', cls:'good'}, {v:'متوسطة', cls:'mid'}, {v:'نحتاج لتطوير', cls:'low'}
  ]
};
function ratingClass(trackId, val){
  const set = RATING_SETS[trackId];
  if(!set) return 'mid';
  const f = set.find(r=>r.v===val);
  return f ? f.cls : 'mid';
}

function setActive(id){
  state.active = id;
  render();
}

function addRecord(trackId, data){
  state[trackId].unshift({ id: uid(), ...data });
  persist(trackId);
  render();
}
function deleteRecord(trackId, id){
  state[trackId] = state[trackId].filter(r=>r.id!==id);
  persist(trackId);
  render();
}

/* ---------- render ---------- */
function render(){
  const app = document.getElementById('app');
  if(!state.loaded){
    app.innerHTML = `<div style="text-align:center;padding:80px 0;color:var(--ink-faint);font-size:14px;">جارِ تحميل المسارات...</div>`;
    return;
  }

  const rail = TRACKS.map(t=>`
    <button class="station ${state.active===t.id?'active':''}" data-track="${t.id}">
      <div class="node">${t.icon}</div>
      <div class="label">${t.title}</div>
      <div class="count">${state[t.id].length} سجل</div>
    </button>
  `).join('');

  const current = TRACKS.find(t=>t.id===state.active);
  const panelHtml = renderPanel(current.id);

  app.innerHTML = `
    <header>
      <div class="kicker">حِفْظٌ · مُراجَعَةٌ · تِلاوَةٌ</div>
      <h1>مسارات القرآن الكريم</h1>
      <p class="sub">أربعة مسارات لمتابعة رحلة المتعلم يوماً بيوم</p>
      <div class="divider">
        <span class="ln"></span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#A9791E" stroke-width="1.5"><path d="M12 2 14 9 21 12 14 15 12 22 10 15 3 12 10 9 12 2Z"/></svg>
        <span class="ln"></span>
      </div>
    </header>

    <nav class="rail">${rail}</nav>

    <section class="panel">${panelHtml}</section>

    <div class="backup-bar">
      <button id="exportBtn" class="ghost-btn">${iconDownload()} تنزيل نسخة احتياطية</button>
      <label class="ghost-btn" for="importInput">${iconUpload()} استيراد نسخة احتياطية</label>
      <input type="file" id="importInput" accept="application/json" hidden>
    </div>
  `;

  document.querySelectorAll('.station').forEach(btn=>{
    btn.addEventListener('click', ()=> setActive(btn.dataset.track));
  });

  attachFormHandler(current.id);
  attachDeleteHandlers(current.id);
  attachDayAutoFill();
  attachBackupHandlers();
}

function iconDownload(){return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M4 19h16"/></svg>`;}
function iconUpload(){return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21V9"/><path d="M7 14l5-5 5 5"/><path d="M4 19h16"/></svg>`;}

function attachBackupHandlers(){
  const exportBtn = document.getElementById('exportBtn');
  const importInput = document.getElementById('importInput');
  if(exportBtn){
    exportBtn.addEventListener('click', ()=>{
      const payload = {
        hifz: state.hifz, muraja3a: state.muraja3a, nazari: state.nazari, tatbiqi: state.tatbiqi,
        exportedAt: new Date().toISOString()
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const stamp = new Date().toISOString().slice(0,10);
      a.href = url;
      a.download = `مسارات-القرآن-نسخة-${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });
  }
  if(importInput){
    importInput.addEventListener('change', (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try{
          const data = JSON.parse(reader.result);
          ['hifz','muraja3a','nazari','tatbiqi'].forEach(k=>{
            if(Array.isArray(data[k])){
              state[k] = data[k];
              persist(k);
            }
          });
          render();
        }catch(err){
          alert('تعذّرت قراءة الملف — تأكد أنه ملف نسخة احتياطية صحيح.');
        }
      };
      reader.readAsText(file);
    });
  }
}

function renderPanel(trackId){
  const meta = TRACKS.find(t=>t.id===trackId);
  const formHtml = renderForm(trackId);
  const listHtml = renderList(trackId);
  return `
    <div class="panel-head">
      <div>
        <h2>${meta.title}</h2>
        <div class="desc">${meta.desc}</div>
      </div>
    </div>
    ${formHtml}
    <div class="list-wrap">
      <div class="list-head"><h3>السجل</h3></div>
      ${listHtml}
    </div>
  `;
}

function renderForm(trackId){
  const todayNote = `<input type="hidden" name="_track" value="${trackId}">`;
  if(trackId==='hifz' || trackId==='muraja3a'){
    const ratingField = trackId==='hifz' ? `
      <div class="field">
        <label>التقييم</label>
        <select name="rating" required>
          <option value="" disabled selected>اختر التقييم</option>
          <option value="جيد">جيد</option>
          <option value="متوسط">متوسط</option>
          <option value="يحتاج لإعادة">يحتاج لإعادة</option>
        </select>
      </div>` : '';
    return `
      <form class="entry" data-track="${trackId}">
        ${todayNote}
        <div class="field">
          <label>التاريخ</label>
          <input type="date" name="date" required>
        </div>
        <div class="field">
          <label>اليوم</label>
          <input type="text" name="day" placeholder="يُحسب تلقائياً" readonly>
        </div>
        <div class="field">
          <label>من</label>
          <input type="text" name="from" placeholder="مثال: سورة البقرة آية 1" required>
        </div>
        <div class="field">
          <label>إلى</label>
          <input type="text" name="to" placeholder="مثال: سورة البقرة آية 20" required>
        </div>
        ${ratingField}
        <div class="form-actions"><button type="submit" class="submit">إضافة سجل</button></div>
      </form>
    `;
  }
  if(trackId==='nazari'){
    return `
      <form class="entry" data-track="${trackId}">
        ${todayNote}
        <div class="field wide">
          <label>المقرر النظري</label>
          <select name="courseType" required>
            <option value="" disabled selected>اختر النوع</option>
            <option value="متن">متن</option>
            <option value="مذكرة التجويد">مذكرة التجويد</option>
          </select>
        </div>
        <div class="field wide">
          <label>عنوان الدرس / الموضوع</label>
          <input type="text" name="courseTitle" placeholder="مثال: باب أحكام النون الساكنة">
        </div>
        <div class="field">
          <label>التاريخ</label>
          <input type="date" name="date" required>
        </div>
        <div class="field">
          <label>اليوم</label>
          <input type="text" name="day" placeholder="يُحسب تلقائياً" readonly>
        </div>
        <div class="field wide">
          <label>تقييم المتعلم</label>
          <select name="rating" required>
            <option value="" disabled selected>اختر التقييم</option>
            <option value="جيد">جيد</option>
            <option value="متوسط">متوسط</option>
            <option value="يحتاج لإعادة">يحتاج لإعادة</option>
          </select>
        </div>
        <div class="form-actions"><button type="submit" class="submit">إضافة سجل</button></div>
      </form>
    `;
  }
  if(trackId==='tatbiqi'){
    return `
      <form class="entry" data-track="${trackId}">
        ${todayNote}
        <div class="field full">
          <label>مقرر التلاوة التطبيقي</label>
          <input type="text" name="course" placeholder="مثال: تطبيق أحكام المدود - جزء عم" required>
        </div>
        <div class="field">
          <label>التاريخ</label>
          <input type="date" name="date" required>
        </div>
        <div class="field">
          <label>اليوم</label>
          <input type="text" name="day" placeholder="يُحسب تلقائياً" readonly>
        </div>
        <div class="field">
          <label>من</label>
          <input type="text" name="from" placeholder="مثال: سورة الملك آية 1" required>
        </div>
        <div class="field">
          <label>إلى</label>
          <input type="text" name="to" placeholder="مثال: سورة الملك آية 10" required>
        </div>
        <div class="field wide">
          <label>تقييم المتعلم</label>
          <select name="rating" required>
            <option value="" disabled selected>اختر التقييم</option>
            <option value="جيدة">جيدة</option>
            <option value="متوسطة">متوسطة</option>
            <option value="نحتاج لتطوير">نحتاج لتطوير</option>
          </select>
        </div>
        <div class="form-actions"><button type="submit" class="submit">إضافة سجل</button></div>
      </form>
    `;
  }
  return '';
}

function renderList(trackId){
  const records = state[trackId];
  if(!records.length){
    return `<div class="empty">${iconEmpty()}<div>لا توجد سجلات بعد — أضِف أول سجل من النموذج أعلاه.</div></div>`;
  }
  return records.map(r=>{
    let mainHtml = '';
    let badge = '';
    if(trackId==='hifz' || trackId==='muraja3a'){
      mainHtml = `
        <span class="day">${r.day || weekday(r.date)}</span>
        <span class="date">${fmtDate(r.date)}</span>
        <span class="range">من <b>${escapeHtml(r.from)}</b> إلى <b>${escapeHtml(r.to)}</b></span>
      `;
      if(trackId==='hifz'){
        badge = `<span class="badge ${ratingClass('hifz', r.rating)}">${r.rating}</span>`;
      }
    } else if(trackId==='nazari'){
      mainHtml = `
        <span class="day">${r.day || weekday(r.date)}</span>
        <span class="date">${fmtDate(r.date)}</span>
        <span class="course">${escapeHtml(r.courseType)}${r.courseTitle ? ' — ' + escapeHtml(r.courseTitle) : ''}</span>
      `;
      badge = `<span class="badge ${ratingClass('nazari', r.rating)}">${r.rating}</span>`;
    } else if(trackId==='tatbiqi'){
      mainHtml = `
        <span class="day">${r.day || weekday(r.date)}</span>
        <span class="date">${fmtDate(r.date)}</span>
        <span class="course">${escapeHtml(r.course)}</span>
        <span class="range">من <b>${escapeHtml(r.from)}</b> إلى <b>${escapeHtml(r.to)}</b></span>
      `;
      badge = `<span class="badge ${ratingClass('tatbiqi', r.rating)}">${r.rating}</span>`;
    }
    return `
      <div class="entry-card">
        <div class="entry-main">${mainHtml}</div>
        <div class="row-actions">
          ${badge}
          <button class="del" data-id="${r.id}" title="حذف">${iconTrash()}</button>
        </div>
      </div>
    `;
  }).join('');
}

function escapeHtml(s){
  if(s===undefined || s===null) return '';
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function attachDayAutoFill(){
  document.querySelectorAll('form.entry input[name="date"]').forEach(dateInput=>{
    dateInput.addEventListener('change', ()=>{
      const form = dateInput.closest('form');
      const dayInput = form.querySelector('input[name="day"]');
      if(dayInput) dayInput.value = weekday(dateInput.value);
    });
  });
}

function attachFormHandler(trackId){
  const form = document.querySelector(`form.entry[data-track="${trackId}"]`);
  if(!form) return;
  form.addEventListener('submit', (e)=>{
    e.preventDefault();
    const fd = new FormData(form);
    const data = {};
    for(const [k,v] of fd.entries()){
      if(k==='_track') continue;
      data[k] = v;
    }
    if(!data.day) data.day = weekday(data.date);
    addRecord(trackId, data);
  });
}

function attachDeleteHandlers(trackId){
  document.querySelectorAll('.del').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      deleteRecord(trackId, btn.dataset.id);
    });
  });
}

loadAll();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
</script>
</body>
</html>
